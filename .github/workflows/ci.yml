# Grasp — continuous integration
# Requires Xcode 26+ / iOS 26 SDK (matches project deployment target).
# If GitHub-hosted runners lag behind your local SDK, use workflow_dispatch on a
# self-hosted Mac with Xcode 26.4+ or adjust the Xcode selector step below.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & unit tests (Simulator)
    runs-on: macos-15
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Pick Xcode 26.x when available on the runner; otherwise latest (see logs).
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Environment
        run: |
          xcodebuild -version
          swift --version

      - name: Cache Swift SPM
        uses: actions/cache@v4
        with:
          path: |
            DerivedData/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Grasp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: List destinations
        run: xcodebuild -showdestinations -project Grasp.xcodeproj -scheme Grasp

      - name: Build and test (GraspTests only)
        run: |
          set -eo pipefail
          xcodebuild \
            -project Grasp.xcodeproj \
            -scheme Grasp \
            -destination 'generic/platform=iOS Simulator' \
            -sdk iphonesimulator \
            -only-testing:GraspTests \
            -derivedDataPath "$GITHUB_WORKSPACE/DerivedData" \
            -clonedSourcePackagesDirPath "$GITHUB_WORKSPACE/DerivedData/SourcePackages" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM= \
            test
        env:
          NSUnbufferedIO: "YES"
